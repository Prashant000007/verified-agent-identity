name: Evaluate Skill

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest

    env:
      GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install promptfoo
        run: npm install -g promptfoo

      - name: Run promptfoo eval
        run: promptfoo eval --no-cache --output results.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: results.json

      - name: Write job summary
        if: always()
        run: |
          echo "### Promptfoo Skill Evaluation" >> "$GITHUB_STEP_SUMMARY"
          if [ -f results.json ]; then
            PASS=$(jq '[.results[] | select(.success == true)] | length' results.json)
            FAIL=$(jq '[.results[] | select(.success == false)] | length' results.json)
            echo "- Passed: $PASS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Failed: $FAIL" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- results.json not found" >> "$GITHUB_STEP_SUMMARY"
          fi
